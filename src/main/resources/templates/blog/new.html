<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>新しいブログ</title>
</head>

<body>
    <div th:replace="~{fragments/layout :: header}"></div>

    <div class="container">
        <h1>新しいブログ</h1>

        <form th:action="@{/blogs}" method="post" class="blog-form">
            <div class="form-group">
                <label for="title" class="form-label">タイトル</label>
                <input type="text" id="title" name="title" class="form-control" placeholder="ブログのタイトルを入力してください"
                    required>
            </div>

            <div class="form-group">
                <label for="content" class="form-label">本文</label>
                <textarea id="content" name="content" rows="8" class="form-control" placeholder="ここに本文を入力してください"
                    required></textarea>
            </div>
            <div class="form-group">
                <label for="userName" class="form-label">投稿者名</label>
                <input type="text" id="userName" name="userName" class="form-control" placeholder="お名前を入力してください"
                    required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">登録</button>
                <a th:href="@{/blogs}" class="btn-cancel">キャンセル</a>
            </div>
        </form>
    </div>
</body>

</html>
