<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>All blogs</title>
</head>
<body>
    <div th:replace="~{fragments/layout :: header}"></div>
    
    <div class="container">
        <h1>ブログ一覧</h1>
        
        <div th:each="blog : ${blogs}" class="blog-group">
            <h2 class="blog-title">
                <a th:href="@{/blog/detail/{id}(id=${blog.id})}" th:text="${blog.title}">ブログのタイトル</a>
            </h2>
            <p class="blog-summary" th:text="${blog.content}">ブログの本文（抜粋）</p>
        </div>
    </div>
</body>
</html>
